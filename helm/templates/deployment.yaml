apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cnpg-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnpg-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cnpg-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cnpg-ui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cnpg-ui.serviceAccountName" . }}
      containers:
        - name: cnpg-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NAMESPACE
              value: {{ .Values.config.namespace | quote }}
            - name: AWS_REGION
              value: {{ .Values.config.awsRegion | quote }}
            - name: S3_BUCKET
              value: {{ .Values.config.s3Bucket | quote }}
            - name: DEFAULT_CLUSTER
              value: {{ .Values.config.defaultCluster | quote }}
            - name: AWS_CREDENTIALS_SECRET
              value: {{ .Values.config.awsCredentialsSecret | quote }}
            - name: STORAGE_CLASS
              value: {{ .Values.postgres.storageClass | quote }}
            - name: NODE_SELECTOR
              value: {{ .Values.postgres.nodeSelector | toJson | quote }}
            - name: TOLERATIONS
              value: {{ .Values.postgres.tolerations | toJson | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.awsCredentialsSecret }}
                  key: access-key
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.awsCredentialsSecret }}
                  key: secret-key
                  optional: true
            - name: DB_PATH
              value: /data/cnpg-ui.db
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "cnpg-ui.fullname" . }}-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cnpg-ui.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnpg-ui.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
