{{- if and .Values.postgres.create .Values.postgres.backup.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ .Values.postgres.clusterName }}-scheduled
  namespace: {{ .Values.config.namespace }}
  labels:
    {{- include "cnpg-ui.labels" . | nindent 4 }}
  annotations:
    # post-install,post-upgrade: runs after the operator CRDs are installed,
    # and re-applies on upgrade so schedule changes take effect via helm upgrade.
    helm.sh/hook: post-install
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: keep
spec:
  schedule: {{ .Values.postgres.backup.schedule | quote }}
  backupOwnerReference: cluster
  cluster:
    name: {{ .Values.postgres.clusterName }}
  method: barmanObjectStore
  target: primary
{{- end }}
