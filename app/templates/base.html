<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50" style="color-scheme: light;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CNPG UI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'Noto Sans', 'sans-serif'],
            serif: ['Source Serif 4', 'ui-serif', 'Georgia', 'Cambria', 'Times New Roman', 'Times', 'serif'],
          },
          colors: {
            brand: {
              50:  '#e7f5f3',
              100: '#ccebe7',
              200: '#9fd7d0',
              300: '#6fc2ba',
              400: '#45aca3',
              500: '#2f9186',
              600: '#2a7f76',
              700: '#226b64',
              800: '#1c5752',
              900: '#164744',
            },
            slate: {
              850: '#172033',
              950: '#0b1120',
            }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    :root{
      --brand-50:  #e7f5f3;
      --brand-100: #ccebe7;
      --brand-600: #2f9186;
      --brand-700: #2a7f76;
      --slate-50:  #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-500: #64748b;
      --slate-700: #334155;
      --slate-900: #0f172a;
      --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.06), 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .nav-link{
      display:flex;
      align-items:center;
      gap:0.75rem;
      padding:0.625rem 0.75rem;
      border-radius:0.75rem;
      font-size:0.875rem;
      font-weight:600;
      color:var(--slate-700);
      transition:background-color 150ms ease,color 150ms ease,border-color 150ms ease;
      border:1px solid transparent;
    }
    .nav-link:hover{ background:var(--slate-100); color:var(--slate-900); }
    .nav-link.active{ background:var(--brand-50); border-color:rgba(47,145,134,0.22); color:var(--slate-900); }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:0.125rem 0.625rem;
      border-radius:9999px;
      font-size:0.75rem;
      font-weight:700;
      border:1px solid transparent;
      line-height:1.25rem;
      white-space:nowrap;
    }
    .badge-green { background:#ecfdf5; color:#047857; border-color:rgba(5,150,105,0.18); }
    .badge-yellow{ background:#fffbeb; color:#b45309; border-color:rgba(245,158,11,0.25); }
    .badge-red   { background:#fff1f2; color:#be123c; border-color:rgba(244,63,94,0.22); }
    .badge-blue  { background:#eff6ff; color:#1d4ed8; border-color:rgba(59,130,246,0.22); }
    .badge-slate { background:#f1f5f9; color:#334155; border-color:rgba(148,163,184,0.35); }

    .card{
      background:#ffffff;
      border:1px solid var(--slate-200);
      border-radius:0.875rem;
      padding:1.5rem;
      box-shadow:var(--shadow-card);
    }

    .btn-primary{
      display:inline-flex;
      align-items:center;
      gap:0.5rem;
      padding:0.5rem 1rem;
      background:var(--brand-600);
      color:#ffffff;
      font-size:0.875rem;
      font-weight:600;
      border-radius:0.75rem;
      transition:background-color 150ms ease,box-shadow 150ms ease,transform 150ms ease,opacity 150ms ease;
    }
    .btn-primary:hover{ background:var(--brand-700); }
    .btn-primary:disabled{ opacity:0.55; cursor:not-allowed; }

    .btn-danger{
      display:inline-flex;
      align-items:center;
      gap:0.5rem;
      padding:0.5rem 1rem;
      background:#e11d48;
      color:#ffffff;
      font-size:0.875rem;
      font-weight:600;
      border-radius:0.75rem;
      transition:background-color 150ms ease;
    }
    .btn-danger:hover{ background:#be123c; }

    .btn-ghost{
      display:inline-flex;
      align-items:center;
      gap:0.5rem;
      padding:0.5rem 1rem;
      background:#ffffff;
      color:var(--slate-900);
      border:1px solid var(--slate-200);
      font-size:0.875rem;
      font-weight:600;
      border-radius:0.75rem;
      transition:background-color 150ms ease,border-color 150ms ease,color 150ms ease;
    }
    .btn-ghost:hover{ background:var(--slate-50); border-color:#cbd5e1; }

    .input{
      width:100%;
      background:#ffffff;
      border:1px solid var(--slate-200);
      border-radius:0.75rem;
      padding:0.5rem 0.75rem;
      font-size:0.875rem;
      color:var(--slate-900);
      outline:none;
      transition:border-color 150ms ease, box-shadow 150ms ease;
    }
    .input::placeholder{ color:var(--slate-500); }
    .input:focus{
      border-color:rgba(47,145,134,0.55);
      box-shadow:0 0 0 4px rgba(47,145,134,0.14);
    }

    .label{
      display:block;
      font-size:0.875rem;
      font-weight:600;
      color:var(--slate-700);
      margin-bottom:0.375rem;
    }

    th{
      padding:0.75rem 1rem;
      text-align:left;
      font-size:0.75rem;
      font-weight:700;
      color:var(--slate-500);
      text-transform:uppercase;
      letter-spacing:0.08em;
    }
    td{ padding:0.75rem 1rem; font-size:0.875rem; color:var(--slate-700); }
  </style>
</head>
<body class="h-full flex font-sans antialiased text-slate-900 bg-slate-50">

  <!-- Sidebar -->
  <aside class="fixed inset-y-0 left-0 w-64 bg-white border-r border-slate-200 flex flex-col z-30">
    <!-- Logo -->
    <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-200">
      <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
        </svg>
      </div>
      <div>
        <p class="text-slate-900 font-bold text-base leading-tight">CNPG UI</p>
        <p class="text-slate-500 text-xs">CloudNativePG Manager</p>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <a href="/"
         class="nav-link {% if request.url.path == '/' %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>

      <a href="/backups"
         class="nav-link {% if request.url.path == '/backups' %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
        </svg>
        Backups
      </a>

      <a href="/restore"
         class="nav-link {% if request.url.path == '/restore' %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Restore
      </a>

      <a href="/settings"
         class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Settings
      </a>
    </nav>

    <!-- Footer / namespace indicator -->
    <div class="px-4 py-4 border-t border-slate-200">
      <div class="flex items-center gap-2 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg">
        <div class="w-2 h-2 bg-brand-600 rounded-full flex-shrink-0"></div>
        <div class="min-w-0">
          <p class="text-xs text-slate-500 leading-none mb-0.5">Namespace</p>
          <p class="text-sm text-slate-900 font-medium truncate">{{ namespace }}</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <div class="pl-64 flex flex-col min-h-screen w-full">
    <!-- Announcement strip (matches screenshot vibe) -->
    <div class="bg-brand-600 text-white text-sm px-8 py-2 flex items-center justify-between">
      <div class="truncate">
        <span class="font-semibold">Live view</span>
        <span class="opacity-90">. Cluster health and backup status update as you work</span>
      </div>
      <a class="font-semibold hover:underline" href="/settings">Settings</a>
    </div>

    <!-- Top bar -->
    <header class="sticky top-0 z-20 bg-white/90 backdrop-blur-sm border-b border-slate-200 px-8 py-4 flex items-center justify-between">
      <div class="text-2xl leading-tight text-slate-900 font-serif font-semibold">
        {% block header_title %}{% endblock %}
      </div>
      <div class="flex items-center gap-3">
        <span class="text-xs text-slate-500">CNPG UI v0.1.0</span>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 px-8 py-8">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
