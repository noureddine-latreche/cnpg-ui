# ---------------------------------------------------------------------------
# CNPG operator (subchart)
# Set enabled: false if the operator is already installed in your cluster.
# ---------------------------------------------------------------------------
cnpgOperator:
  enabled: true

image:
  repository: clickoniqhub/cnpg-webui
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8880

ingress:
  enabled: false
  className: traefik
  host: cnpg-ui.example.com
  tls: false
  clusterIssuer: letsencrypt
  # Extra annotations merged into the Ingress resource (e.g. IP allowlist middleware).
  annotations: {}

config:
  namespace: default            # Kubernetes namespace where CNPG Cluster CRDs live
  awsRegion: us-east-1
  s3Bucket: ""                  # Pre-fills the S3 bucket field in the UI
  defaultCluster: postgres
  awsCredentialsSecret: aws-credentials

persistence:
  size: 1Gi
  storageClass: ""              # Leave blank to use the cluster default StorageClass

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

serviceAccount:
  name: ""                      # Defaults to the release fullname

# ---------------------------------------------------------------------------
# PostgreSQL cluster provisioning
#
# When postgres.create is true, a CNPG Cluster CRD is created as a
# post-install Helm hook — exactly once, never modified by subsequent
# helm upgrades.  This means you can safely run `helm upgrade` after a
# PITR restore without Helm trying to revert the bootstrap field.
#
# Set postgres.create: false when the cluster already exists (e.g. it was
# previously created by this chart and you are just upgrading the UI).
# ---------------------------------------------------------------------------
postgres:
  create: false

  clusterName: postgres

  # PostgreSQL image. Use the official CNPG image or a custom one that
  # includes extra extensions (e.g. pgvector).
  image: ghcr.io/cloudnative-pg/postgresql:17.5
  imagePullSecrets: []
  # - regcred

  instances: 1

  # The application database and its owner role.  CNPG creates both on
  # first boot and writes connection credentials to the
  # <clusterName>-app Kubernetes Secret.
  appOwner: app
  appDatabase: app
  appOwnerSuperuser: false   # Grant SUPERUSER + CREATEROLE + CREATEDB to appOwner
  bootstrapSecret: ""        # Kubernetes Secret with username/password keys; if set, CNPG uses this password instead of generating one

  # SQL statements run as superuser on the postgres database after initdb.
  # Use this for privilege grants (e.g. CREATEROLE) that require superuser.
  postInitSQL: []
  # - "ALTER ROLE myapp CREATEROLE;"

  # SQL statements run against the application database after initdb.
  # Useful for installing extensions like pgvector.
  postInitApplicationSQL: []
  # - CREATE EXTENSION IF NOT EXISTS vector;
  # - CREATE EXTENSION IF NOT EXISTS pg_trgm;

  storageSize: 20Gi
  walStorageSize: 5Gi
  storageClass: ""              # Leave blank for the cluster default

  # Node affinity / tolerations — useful when the postgres node pool is
  # tainted (e.g. workload=postgres:NoSchedule on Hetzner k3s clusters).
  nodeSelector: {}
  tolerations: []
  # nodeSelector:
  #   workload: postgres
  # tolerations:
  #   - key: workload
  #     operator: Equal
  #     value: postgres
  #     effect: NoSchedule

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

  # Any postgresql.conf parameter as key: "value" string pairs.
  # Numbers and booleans must be quoted.
  # Reference: https://cloudnative-pg.io/documentation/current/postgresql_conf/
  postgresql:
    parameters: {}
    # max_connections: "200"
    # shared_buffers: "8GB"
    # effective_cache_size: "24GB"
    # work_mem: "64MB"
    # maintenance_work_mem: "512MB"
    # wal_buffers: "64MB"
    # checkpoint_completion_target: "0.9"
    # default_statistics_target: "100"

  backup:
    enabled: false

    s3Bucket: ""
    s3Env: ""                   # Path prefix inside the bucket, e.g. "prod" or "sandbox"
    awsRegion: ""               # Defaults to config.awsRegion when blank
    awsCredentialsSecret: aws-credentials

    retentionPolicy: 30d

    # Weekly scheduled backup — CNPG uses a 6-field cron (seconds included).
    # Default: every Sunday at 02:00:00 UTC.
    schedule: "0 0 2 * * 0"
