{{- if .Values.postgres.create }}
{{- $awsRegion := .Values.postgres.backup.awsRegion | default .Values.config.awsRegion }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.postgres.clusterName }}
  namespace: {{ .Values.config.namespace }}
  annotations:
    # post-install: created exactly once during `helm install`, never touched
    # by `helm upgrade` — preserves CNPG's bootstrap immutability contract.
    helm.sh/hook: post-install
    helm.sh/hook-weight: "0"
    # keep: `helm uninstall` will NOT delete this cluster.
    helm.sh/hook-delete-policy: keep
spec:
  instances: {{ .Values.postgres.instances }}
  imageName: {{ .Values.postgres.image }}
  imagePullPolicy: IfNotPresent
  {{- if .Values.postgres.imagePullSecrets }}
  imagePullSecrets:
    {{- range .Values.postgres.imagePullSecrets }}
    - name: {{ . }}
    {{- end }}
  {{- end }}

  bootstrap:
    initdb:
      database: {{ .Values.postgres.appDatabase }}
      owner: {{ .Values.postgres.appOwner }}
      {{- if .Values.postgres.bootstrapSecret }}
      secret:
        name: {{ .Values.postgres.bootstrapSecret }}
      {{- end }}
      {{- $initSQL := .Values.postgres.postInitSQL | default list }}
      {{- if .Values.postgres.appOwnerSuperuser }}
      {{- $initSQL = append $initSQL (printf "ALTER ROLE %s WITH SUPERUSER CREATEROLE CREATEDB;" .Values.postgres.appOwner) }}
      {{- end }}
      {{- if $initSQL }}
      postInitSQL:
        {{- toYaml $initSQL | nindent 8 }}
      {{- end }}
      {{- if .Values.postgres.postInitApplicationSQL }}
      postInitApplicationSQL:
        {{- toYaml .Values.postgres.postInitApplicationSQL | nindent 8 }}
      {{- end }}

  {{- if .Values.postgres.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: s3://{{ .Values.postgres.backup.s3Bucket }}/{{ .Values.postgres.backup.s3Env }}/cnpg
      s3Credentials:
        accessKeyId:
          name: {{ .Values.postgres.backup.awsCredentialsSecret }}
          key: access-key
        secretAccessKey:
          name: {{ .Values.postgres.backup.awsCredentialsSecret }}
          key: secret-key
      wal:
        compression: gzip
        maxParallel: 8
      data:
        compression: gzip
        immediateCheckpoint: false
        jobs: 8
    retentionPolicy: {{ .Values.postgres.backup.retentionPolicy }}
  {{- end }}

  storage:
    size: {{ .Values.postgres.storageSize }}
    {{- if .Values.postgres.storageClass }}
    storageClass: {{ .Values.postgres.storageClass }}
    {{- end }}

  walStorage:
    size: {{ .Values.postgres.walStorageSize }}
    {{- if .Values.postgres.storageClass }}
    storageClass: {{ .Values.postgres.storageClass }}
    {{- end }}

  {{- if .Values.postgres.postgresql.parameters }}
  postgresql:
    parameters:
      {{- toYaml .Values.postgres.postgresql.parameters | nindent 6 }}
  {{- end }}

  resources:
    {{- toYaml .Values.postgres.resources | nindent 4 }}

  env:
    - name: AWS_EC2_METADATA_DISABLED
      value: "true"
    {{- if .Values.postgres.backup.enabled }}
    - name: AWS_DEFAULT_REGION
      value: {{ $awsRegion | quote }}
    {{- end }}

  {{- if or .Values.postgres.nodeSelector .Values.postgres.tolerations }}
  affinity:
    {{- if .Values.postgres.nodeSelector }}
    nodeSelector:
      {{- toYaml .Values.postgres.nodeSelector | nindent 6 }}
    {{- end }}
    {{- if .Values.postgres.tolerations }}
    tolerations:
      {{- toYaml .Values.postgres.tolerations | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}
